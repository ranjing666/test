<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Frontend Showcase</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Portfolio Demo</p>
        <h1>Build a frontend project that people can understand in 30 seconds.</h1>
        <p class="hero__text">
          This demo keeps the structure simple: clear intro, filtered projects, and obvious outcomes.
        </p>
      </div>
    </header>

    <main class="page">
      <section class="panel">
        <h2>Filter by tag</h2>
        <div id="filters" class="filters"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Projects</h2>
          <p id="project-count"></p>
        </div>
        <div id="project-list" class="project-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
